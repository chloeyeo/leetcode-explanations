<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>LeetCode Daily | Dynamic Programming | 2026-06-14</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    background: #0d1117;
    color: #c9d1d9;
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, monospace;
    font-size: 15px;
    line-height: 1.6;
    padding: 16px;
    max-width: 800px;
    margin: 0 auto;
  }
  header {
    text-align: center;
    padding: 24px 0 16px;
    border-bottom: 2px solid #21262d;
    margin-bottom: 24px;
  }
  header h1 {
    font-size: 1.6rem;
    color: #58a6ff;
    letter-spacing: 0.5px;
  }
  header .date {
    color: #8b949e;
    font-size: 0.85rem;
    margin-top: 4px;
  }
  .type-badge {
    display: inline-block;
    background: #1f6feb;
    color: #fff;
    border-radius: 20px;
    padding: 3px 14px;
    font-size: 0.8rem;
    font-weight: 700;
    letter-spacing: 1px;
    margin-top: 8px;
    text-transform: uppercase;
  }
  .problem-card {
    background: #161b22;
    border: 1px solid #30363d;
    border-radius: 12px;
    margin-bottom: 28px;
    overflow: hidden;
  }
  .problem-header {
    display: flex;
    align-items: center;
    gap: 12px;
    padding: 16px 20px;
    border-bottom: 1px solid #21262d;
    background: #0d1117;
  }
  .problem-num {
    color: #8b949e;
    font-size: 0.85rem;
  }
  .problem-title {
    font-size: 1.1rem;
    font-weight: 700;
    color: #e6edf3;
    flex: 1;
  }
  .badge {
    border-radius: 6px;
    padding: 2px 10px;
    font-size: 0.78rem;
    font-weight: 700;
  }
  .easy   { background: #0d4429; color: #3fb950; border: 1px solid #238636; }
  .medium { background: #3d2b00; color: #e3b341; border: 1px solid #9e6a03; }
  .hard   { background: #490202; color: #f85149; border: 1px solid #b62324; }
  .section {
    padding: 16px 20px;
    border-bottom: 1px solid #21262d;
  }
  .section:last-child { border-bottom: none; }
  .section-title {
    font-size: 0.75rem;
    text-transform: uppercase;
    letter-spacing: 1px;
    color: #8b949e;
    margin-bottom: 10px;
    font-weight: 700;
  }
  .ascii-art {
    background: #010409;
    border: 1px solid #21262d;
    border-radius: 8px;
    padding: 12px 16px;
    font-family: 'Courier New', monospace;
    font-size: 0.78rem;
    color: #39d353;
    white-space: pre;
    overflow-x: auto;
    line-height: 1.4;
  }
  pre.code-block {
    background: #010409;
    border: 1px solid #21262d;
    border-radius: 8px;
    padding: 14px 16px;
    font-family: 'Courier New', monospace;
    font-size: 0.82rem;
    overflow-x: auto;
    line-height: 1.5;
    white-space: pre;
  }
  .kw  { color: #ff7b72; }
  .fn  { color: #d2a8ff; }
  .st  { color: #a5d6ff; }
  .cm  { color: #8b949e; font-style: italic; }
  .nm  { color: #79c0ff; }
  .op  { color: #ff7b72; }
  .bi  { color: #ffa657; }
  table.complexity {
    width: 100%;
    border-collapse: collapse;
    font-size: 0.82rem;
    margin-top: 4px;
  }
  table.complexity th {
    background: #21262d;
    color: #8b949e;
    padding: 7px 10px;
    text-align: left;
    font-size: 0.75rem;
    text-transform: uppercase;
    letter-spacing: 0.5px;
  }
  table.complexity td {
    padding: 7px 10px;
    border-bottom: 1px solid #21262d;
    color: #c9d1d9;
  }
  table.complexity tr:last-child td { border-bottom: none; }
  table.complexity .highlight { color: #58a6ff; font-weight: 700; }
  footer {
    text-align: center;
    padding: 20px 0;
    border-top: 2px solid #21262d;
    margin-top: 8px;
  }
  footer a { color: #58a6ff; text-decoration: none; font-weight: 600; }
  footer a:hover { text-decoration: underline; }
  footer .note { color: #8b949e; font-size: 0.8rem; margin-top: 4px; }
</style>
</head>
<body>

<header>
  <h1>🧩 LeetCode Daily</h1>
  <div class="date">2026-06-14 (Sun)</div>
  <span class="type-badge">Dynamic Programming</span>
</header>
